name: Build and push images

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/SimonBolivarHacker/mapa-emergencia-rescate

jobs:
  build-push:
    runs-on: ubuntu-latest
    environment: production-hetzner
    steps:
      - uses: actions/checkout@v7

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_PULL_USER }}
          password: ${{ secrets.TOKEN_GITHUB_PACKAGES }}

      - uses: docker/setup-buildx-action@v4

      - name: frontend
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          target: runtime
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ env.IMAGE }}-frontend:${{ github.sha }}
            ${{ env.IMAGE }}-frontend:latest
          build-args: |
            APP_BUILD_SHA=${{ github.sha }}
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL || 'https://api.terremotovenezuela.app' }}
            NEXT_PUBLIC_R2_PUBLIC_BASE=${{ vars.NEXT_PUBLIC_R2_PUBLIC_BASE }}
            NEXT_PUBLIC_TURNSTILE_SITE_KEY=${{ secrets.TURNSTILE_SITE_KEY }}
            NEXT_PUBLIC_ASSET_PREFIX=${{ secrets.NEXT_PUBLIC_ASSET_PREFIX }}
            NEXT_PUBLIC_OPENPANEL_CLIENT_ID=${{ secrets.NEXT_PUBLIC_OPENPANEL_CLIENT_ID }}
            NEXT_PUBLIC_OPENPANEL_PRODUCTION_HOST=${{ vars.NEXT_PUBLIC_OPENPANEL_PRODUCTION_HOST || 'terremotovenezuela.app' }}
            NEXT_PUBLIC_OPENPANEL_DASHBOARD_URL=${{ secrets.NEXT_PUBLIC_OPENPANEL_DASHBOARD_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: backend
        uses: docker/build-push-action@v7
        with:
          context: .
          file: backend/Dockerfile
          target: runtime
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ env.IMAGE }}-backend:${{ github.sha }}
            ${{ env.IMAGE }}-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: admin
        uses: docker/build-push-action@v7
        with:
          context: ./admin
          target: runtime
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ env.IMAGE }}-admin:${{ github.sha }}
            ${{ env.IMAGE }}-admin:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
